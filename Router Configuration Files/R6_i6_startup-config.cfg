!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R6
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
ip auth-proxy max-nodata-conns 3
ip admission max-nodata-conns 3
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
archive
 log config
  hidekeys
! 
!
!
!
ip tcp synwait-time 5
!
!
!
!
interface FastEthernet0/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet0/1
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface Serial1/0
 ip address 192.168.10.10 255.255.255.252
 serial restart-delay 0
!
interface Serial1/1
 ip address 192.168.20.6 255.255.255.252
 ip rip send version 1
 ip rip receive version 1
 serial restart-delay 0
!
interface Serial1/2
 ip address 192.168.30.6 255.255.255.252
 serial restart-delay 0
!
interface Serial1/3
 ip address 192.168.40.6 255.255.255.252
 serial restart-delay 0
!
interface FastEthernet2/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
router ospf 1
 router-id 6.6.6.6
 log-adjacency-changes
 redistribute static metric 10 subnets
 redistribute rip metric 10 subnets
 network 192.168.10.8 0.0.0.3 area 0
!
router rip
 version 2
 redistribute ospf 1 metric 10
 network 192.168.20.0
 network 192.168.30.0
 network 192.168.40.0
!
ip forward-protocol nd
ip route 191.168.40.128 255.255.255.128 192.168.40.5
!
!
no ip http server
no ip http secure-server
!
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
!
end
